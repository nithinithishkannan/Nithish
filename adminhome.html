body {

}

#calendar tbody td {

#calendar #next {

}

#footer {

#slider {

#slider .viewer {

#slider .viewer .reel {
	display: none;
	height: 300px;
}

#slider .viewer .reel .slide {
	position: relative;
	width: 590px;
	height: 300px;
}

#splash {
	width: 980px;
	margin: 30px auto 0px auto;
